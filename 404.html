<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d0d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.card{background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:60px 40px;max-width:480px;width:100%;text-align:center;position:relative}
.code{font-size:100px;font-weight:800;font-family:'Cinzel',serif;background:linear-gradient(135deg,#c9a84c,#f0c866);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,76,0.08),transparent 70%);pointer-events:none;z-index:0}
.content{position:relative;z-index:1}
h1{font-family:'Cinzel',serif;color:#c9a84c;font-size:1.3rem;margin-bottom:12px;font-weight:700}
p{color:#8a7a5a;font-size:0.9rem;line-height:1.7;margin-bottom:8px}
.emoji{font-size:40px;display:block;margin-bottom:16px}
.btn{display:inline-block;padding:14px 36px;border-radius:20px;background:linear-gradient(135deg,#c9a84c,#f0c866);color:#0d0d0d;font-size:1rem;font-weight:700;text-decoration:none;cursor:pointer;position:fixed;z-index:999;white-space:nowrap;user-select:none;-webkit-user-select:none;touch-action:none;transition:none}
.btn.caught{position:relative;display:inline-block;margin-top:24px;cursor:pointer}
.btn.caught:hover{transform:scale(1.03);box-shadow:0 8px 30px rgba(201,168,76,0.3)}
.btn.caught:active{transform:scale(.97)}
.btn.caught:link{text-decoration:none}
.counter{color:#5a4a3a;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;margin-top:20px;display:block;min-height:1.2em}
.msg{color:#5a4a3a;font-size:0.8rem;margin-top:8px;min-height:1.2em;transition:opacity .3s}
.taunt{display:block;margin-top:10px;color:#8a7a5a;font-size:0.9rem;min-height:1.4em;font-style:italic}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="glow"></div>
  <div class="content">
    <span class="emoji" id="emoji">🔒</span>
    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>Cette page a été déplacée, supprimée<br>ou elle vous évite tout simplement.</p>
    <p style="color:#6a5a4a;font-size:0.8rem" id="subtitle">Attrapez le bouton pour partir →</p>
    <span class="counter" id="counter"></span>
    <span class="taunt" id="taunt"></span>
    <span class="msg" id="msg"></span>
  </div>
</div>
<script>
(function(){
  const btn=document.getElementById('btn')||(function(){
    const b=document.createElement('a');
    b.id='btn';
    b.className='btn';
    b.textContent='← Retour aux projets';
    document.body.appendChild(b);
    return b;
  })();

  const emoji=document.getElementById('emoji');
  const subtitle=document.getElementById('subtitle');
  const counter=document.getElementById('counter');
  const msg=document.getElementById('msg');
  const taunt=document.getElementById('taunt');
  const card=document.getElementById('card');

  let caught=0,escaped=0;
  let jumpTimer=null;

  const taunts=[
    'Trop lent !', 'Haha raté !', 'Tu peux pas m\'attraper !',
    'Cherche encore...', 'Presque... non en fait', 'T\'es sérieux là ?',
    'Bouge pas... ah si', 'Pas aujourd\'hui !', 'Même pas peur !',
    'Tu regardes où ?', 'Derrière toi !', 'Nope !',
    'Tu fais exprès ?', 'Encore raté héhé', 'Allez, concentre-toi !'
  ];

  function getPos(e){
    const t=e.touches?e.touches[0]:e;
    return {x:t.clientX||t.pageX,y:t.clientY||t.pageY};
  }

  function randomTaunt(){
    return taunts[Math.floor(Math.random()*taunts.length)];
  }

  function jumpAway(e){
    if(caught>=6)return;
    const pos=getPos(e);
    const bw=btn.offsetWidth, bh=btn.offsetHeight;
    const pad=30;
    let nx, ny;
    let attempts=0;

    do{
      nx=pad+Math.random()*(window.innerWidth-bw-pad*2);
      ny=pad+Math.random()*(window.innerHeight-bh-pad*2);
      attempts++;
    }while(
      Math.abs(nx+bw/2-pos.x)<120 &&
      Math.abs(ny+bh/2-pos.y)<120 &&
      attempts<50
    );

    btn.style.left=nx+'px';
    btn.style.top=ny+'px';
    escaped++;
    const t=randomTaunt();
    taunt.textContent=t+' (tentative n°'+escaped+')';
  }

  function respawnInCard(){
    const cr=card.getBoundingClientRect();
    const bw=btn.offsetWidth, bh=btn.offsetHeight;
    const nx=cr.left+cr.width/2-bw/2;
    const ny=cr.bottom+20;
    btn.style.left=nx+'px';
    btn.style.top=ny+'px';
  }

  function catchMe(){
    if(caught>=6)return;
    caught++;
    if(caught<6){
      taunt.textContent='Hop ! +1 — encore '+(6-caught);
      respawnInCard();
    }else{
      emoji.textContent='🎉';
      subtitle.textContent='BRAVO ! Tu es plus rapide qu\'un bug !';
      counter.textContent='Attrapé en '+escaped+' tentative'+(escaped>1?'s':'');
      msg.textContent='Clique pour rejoindre les projets →';
      btn.classList.add('caught');
      btn.style.left='';
      btn.style.top='';
      btn.textContent='← Retour aux projets';
      btn.href='https://ucfzem.github.io/works/';
      taunt.textContent='';
    }
  }

  function onMove(e){
    if(caught>=6)return;
    const pos=getPos(e);
    const br=btn.getBoundingClientRect();
    const cx=br.left+br.width/2, cy=br.top+br.height/2;
    const dx=pos.x-cx, dy=pos.y-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<150){
      jumpAway(e);
    }
  }

  btn.style.left='-9999px';
  btn.style.top='-9999px';
  setTimeout(respawnInCard,100);

  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchmove',function(e){
    onMove(e);
  });

  btn.addEventListener('click',function(e){
    e.preventDefault();
    catchMe();
  });

  btn.addEventListener('touchstart',function(e){
    e.preventDefault();
    catchMe();
  });

  btn.addEventListener('mouseenter',function(e){
    if(caught>=6)return;
    jumpAway(e);
  });

  // Also flee if mouse gets near on body
  document.addEventListener('mouseover',function(e){
    if(caught>=6)return;
    const pos=getPos(e);
    const br=btn.getBoundingClientRect();
    if(br.left<-9000)return;
    const cx=br.left+br.width/2, cy=br.top+br.height/2;
    const dx=pos.x-cx, dy=pos.y-cy;
    if(Math.sqrt(dx*dx+dy*dy)<200){
      jumpAway(e);
    }
  });

  // Extra flee: any click near button
  document.addEventListener('click',function(e){
    if(caught>=6)return;
    const pos=getPos(e);
    const br=btn.getBoundingClientRect();
    if(br.left<-9000)return;
    const cx=br.left+br.width/2, cy=br.top+br.height/2;
    const dx=pos.x-cx, dy=pos.y-cy;
    if(Math.sqrt(dx*dx+dy*dy)<300){
      jumpAway(e);
    }
  });

  window.addEventListener('resize',respawnInCard);
})();
</script>
</body>
</html>
