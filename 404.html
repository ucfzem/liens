<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d0d;min-height:100vh;padding:20px;overflow:hidden}
.card{background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:60px 40px;max-width:480px;width:100%;text-align:center;position:relative;margin:10vh auto 0}
.code{font-size:100px;font-weight:800;font-family:'Cinzel',serif;background:linear-gradient(135deg,#c9a84c,#f0c866);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,76,0.08),transparent 70%);pointer-events:none;z-index:0}
.content{position:relative;z-index:1}
h1{font-family:'Cinzel',serif;color:#c9a84c;font-size:1.3rem;margin-bottom:12px;font-weight:700}
p{color:#8a7a5a;font-size:0.9rem;line-height:1.7;margin-bottom:8px}
.emoji{font-size:40px;display:block;margin-bottom:16px}
.btn-wrap{height:70px;display:flex;align-items:center;justify-content:center;margin-top:24px}
.btn{display:inline-block;padding:14px 36px;border-radius:20px;background:linear-gradient(135deg,#c9a84c,#f0c866);color:#0d0d0d;font-size:1rem;font-weight:700;text-decoration:none;cursor:pointer;white-space:nowrap;user-select:none;-webkit-user-select:none;touch-action:none;position:fixed;z-index:999;box-shadow:0 0 20px rgba(201,168,76,0.3);transition:none}
.btn.home{position:static;box-shadow:none}
.btn.done{position:static;box-shadow:none}
.btn.done:hover{transform:scale(1.03);box-shadow:0 8px 30px rgba(201,168,76,0.3)}
.btn.done:active{transform:scale(.97)}
.counter{color:#c9a84c;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;margin-top:20px;display:block;min-height:1.2em;font-weight:700}
.msg{color:#5a4a3a;font-size:0.8rem;margin-top:8px;min-height:1.2em}
.taunt{display:block;margin-top:10px;color:#8a7a5a;font-size:1rem;min-height:1.5em;font-style:italic}
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="content">
    <span class="emoji" id="emoji">🔒</span>
    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>Cette page a été déplacée, supprimée<br>ou elle vous évite tout simplement.</p>
    <p style="color:#6a5a4a;font-size:0.8rem" id="subtitle">Clique sur le bouton pour partir →</p>
    <div class="btn-wrap"><a class="btn" id="btn">← Retour aux projets</a></div>
    <span class="taunt" id="taunt"></span>
    <span class="counter" id="counter"></span>
    <span class="msg" id="msg"></span>
  </div>
</div>
<script>
(function(){
  const btn=document.getElementById('btn');
  const emoji=document.getElementById('emoji');
  const subtitle=document.getElementById('subtitle');
  const counter=document.getElementById('counter');
  const msg=document.getElementById('msg');
  const taunt=document.getElementById('taunt');

  let tries=0;
  let done=false;

  const taunts=[
    'Trop lent !', 'Raté !', 'Presque...', 'Encore raté héhé',
    'Tu fais exprès ?', 'Pas aujourd\'hui !',
    'T\'es sérieux ?', 'AH AH !', 'Nope !', 'Cherche encore',
    'Tu cliques comme ma grand-mère', 'Essaie encore !'
  ];

  function getRndPos(){
    const bw=btn.offsetWidth||120, bh=btn.offsetHeight||48;
    const p=20;
    return {
      x:p+Math.random()*(window.innerWidth-bw-p*2),
      y:p+Math.random()*(window.innerHeight-bh-p*2)
    };
  }

  function flee(){
    const pos=getRndPos();
    btn.style.left=pos.x+'px';
    btn.style.top=pos.y+'px';
    btn.classList.remove('home');
    taunt.textContent=taunts[tries-1]||taunts[Math.floor(Math.random()*taunts.length)];
  }

  function goHome(){
    btn.style.left='';
    btn.style.top='';
    btn.classList.add('home');
  }

  function handleDown(e){
    if(done)return;
    e.preventDefault();
    tries++;
    if(tries<6){
      flee();
      msg.textContent='Tentative n°'+tries+'/6';
    }else{
      done=true;
      goHome();
      btn.classList.remove('home');
      btn.classList.add('done');
      btn.href='https://ucfzem.github.io/works/';
      emoji.textContent='🎉';
      subtitle.textContent='BRAVO ! Tu as vaincu le bouton !';
      counter.textContent='Attrapé au bout de '+tries+' tentatives';
      msg.textContent='Clique pour rejoindre les projets →';
      taunt.textContent='';
    }
  }

  btn.addEventListener('mousedown',handleDown);
  btn.addEventListener('touchstart',handleDown);
})();
</script>
</body>
</html>
