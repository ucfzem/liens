<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d0d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:60px 40px;max-width:480px;width:100%;text-align:center;position:relative}
.code{font-size:100px;font-weight:800;font-family:'Cinzel',serif;background:linear-gradient(135deg,#c9a84c,#f0c866);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,76,0.08),transparent 70%);pointer-events:none;z-index:0}
.content{position:relative;z-index:1}
h1{font-family:'Cinzel',serif;color:#c9a84c;font-size:1.3rem;margin-bottom:12px;font-weight:700}
p{color:#8a7a5a;font-size:0.9rem;line-height:1.7;margin-bottom:8px}
.emoji{font-size:40px;display:block;margin-bottom:16px}
.btn{display:inline-block;margin-top:24px;padding:14px 36px;border-radius:20px;background:linear-gradient(135deg,#c9a84c,#f0c866);color:#0d0d0d;font-size:1rem;font-weight:700;text-decoration:none;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:scale(1.03);box-shadow:0 8px 30px rgba(201,168,76,0.3)}
.btn:active{transform:scale(.97)}
.lock{display:inline-block;margin-top:20px;color:#5a4a3a;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="content">
    <span class="emoji">🔒</span>
    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>Cette page a été déplacée, supprimée<br>ou n'a jamais existé.</p>
    <p style="color:#6a5a4a;font-size:0.8rem">— UcfZem —</p>
    <a href="https://ucfzem.github.io/works/" class="btn">← Retour aux projets</a>
    <span class="lock">🔐 Accès restreint</span>
  </div>
</div>
</body>
</html>
